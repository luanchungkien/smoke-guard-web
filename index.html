<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ thống cảnh báo khói – ESP8266</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body>

    <div class="alert-overlay" id="alertOverlay"></div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">🔥</div>
                <h1>SMOKE GUARD
                    <span>ESP8266 · FIREBASE RT</span>
                </h1>
            </div>
            <div class="connection-badge" id="connBadge">
                <span class="dot"></span>
                <span id="connText">KẾT NỐI...</span>
            </div>
        </header>

        <div class="grid">

            <!-- Gauge Panel -->
            <div class="panel">
                <div class="panel-label">📊 MỨC ĐỘ KHÓI (ANALOG)</div>
                <div class="gauge-wrap">
                    <svg class="gauge-svg" viewBox="0 0 200 120">
                        <path class="gauge-track" d="M 20 110 A 80 80 0 0 1 180 110" />
                        <path class="gauge-fill" id="gaugeFill" d="M 20 110 A 80 80 0 0 1 180 110" />
                        <text x="100" y="95" text-anchor="middle" font-family="Orbitron" font-size="28"
                            font-weight="900" fill="#e8eaf6" id="gaugeNum">0</text>
                        <text x="100" y="112" text-anchor="middle" font-family="DM Sans" font-size="10" fill="#4a5070">/
                            1023</text>
                    </svg>
                    <div class="gauge-scale">
                        <span>0</span><span>256</span><span>512</span><span>768</span><span>1023</span>
                    </div>
                    <div class="timestamp" id="lastUpdate">Chưa có dữ liệu</div>
                </div>
            </div>

            <!-- Status Panel -->
            <div class="panel">
                <div class="panel-label">🚨 TRẠNG THÁI</div>
                <div class="status-display">
                    <div class="status-icon" id="statusIcon">⏳</div>
                    <div class="status-text" id="statusText" style="color:var(--muted)">ĐANG KẾT NỐI</div>
                    <div class="status-sub" id="statusSub">Chờ dữ liệu từ thiết bị...</div>
                    <div class="status-bar">
                        <div class="status-bar-fill" id="statusBarFill"></div>
                    </div>
                </div>
            </div>

            <!-- History Panel -->
            <div class="panel history-panel">
                <div class="history-header">
                    <div class="panel-label" style="margin-bottom:0">📋 LỊCH SỬ PHIÊN NÀY</div>
                    <button class="clear-btn" onclick="clearHistory()">XÓA</button>
                </div>

                <div class="stats-row">
                    <div class="stat-box">
                        <div class="stat-val" id="statTotal">0</div>
                        <div class="stat-lbl">TỔNG BẢN GHI</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-val" id="statAlerts" style="color:var(--danger)">0</div>
                        <div class="stat-lbl">LẦN CẢNH BÁO</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-val" id="statMax">0</div>
                        <div class="stat-lbl">GIÁ TRỊ CAO NHẤT</div>
                    </div>
                </div>

                <div class="history-list" id="historyList">
                    <div class="empty-history">Chưa có dữ liệu lịch sử trong phiên này</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://redtime-c3ac7-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ===== CẤU HÌNH =====
        const THRESHOLD = 200;
        const MAX_HISTORY = 100;
        const SAVE_INTERVAL = 2 * 60 * 1000; // 2 phút

        // ===== LẤY DỮ LIỆU CŨ =====
        let history = JSON.parse(localStorage.getItem('smokeHistory')) || [];
        let lastSaveTime = 0;

        document.addEventListener('DOMContentLoaded', () => {
            if (history.length > 0) renderHistory();
        });

        // ===== DOM =====
        const connBadge = document.getElementById('connBadge');
        const connText = document.getElementById('connText');
        const gaugeFill = document.getElementById('gaugeFill');
        const gaugeNum = document.getElementById('gaugeNum');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const statusSub = document.getElementById('statusSub');
        const statusBarFill = document.getElementById('statusBarFill');
        const lastUpdate = document.getElementById('lastUpdate');
        const historyList = document.getElementById('historyList');
        const alertOverlay = document.getElementById('alertOverlay');
        const statTotal = document.getElementById('statTotal');
        const statAlerts = document.getElementById('statAlerts');
        const statMax = document.getElementById('statMax');

        let prevAlert = null;

        // ===== GAUGE =====
        function updateGauge(val) {
            const pct = Math.min(val / 1023, 1);
            const offset = 251 - pct * 251;
            gaugeFill.style.strokeDashoffset = offset;

            let color;
            if (val > THRESHOLD) color = '#ff2d55';
            else if (val > THRESHOLD * 0.6) color = '#ffab00';
            else color = '#00e5ff';

            gaugeFill.style.stroke = color;
            gaugeNum.style.fill = color;
            gaugeNum.textContent = val;
        }

        // ===== STATUS =====
        function updateStatus(analog, warning) {
            const pct = Math.min(analog / 1023 * 100, 100);
            statusBarFill.style.width = pct + '%';

            if (warning == 1) {
                statusIcon.textContent = '🚨';
                statusText.textContent = 'PHÁT HIỆN KHÓI!';
                statusText.style.color = 'var(--danger)';
                statusSub.textContent = `Analog: ${analog} — Vượt ngưỡng ${THRESHOLD}`;
                statusBarFill.style.background = 'var(--danger)';
            } else {
                statusIcon.textContent = '✅';
                statusText.textContent = 'AN TOÀN';
                statusText.style.color = 'var(--safe)';
                statusSub.textContent = `Analog: ${analog} — Dưới ngưỡng ${THRESHOLD}`;
                statusBarFill.style.background = 'var(--safe)';
            }
        }

        function triggerAlertFlash() {
            alertOverlay.classList.remove('flash');
            void alertOverlay.offsetWidth;
            alertOverlay.classList.add('flash');
        }

        // ===== THÊM LỊCH SỬ + LƯU =====
        function addHistory(analog, warning) {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('vi-VN');
                const currentTime = Date.now();

                history.unshift({ analog, warning, time: timeStr });

                if (history.length > MAX_HISTORY) history.pop();

                let shouldSave = false;

                // ✅ Chỉ lưu khi vừa chuyển sang trạng thái có khói
                if (warning == 1 && prevAlert !== 1) {
                    shouldSave = true;
                }

                // ✅ Hoặc đủ 2 phút (trạng thái bình thường)
                else if (warning == 0 && currentTime - lastSaveTime > SAVE_INTERVAL) {
                    shouldSave = true;
                }

                if (shouldSave) {
                    localStorage.setItem('smokeHistory', JSON.stringify(history));
                    lastSaveTime = currentTime;
                }

                renderHistory();
            }
        // ===== RENDER =====
        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<div class="empty-history">Chưa có dữ liệu</div>';
                return;
            }

            const alerts = history.filter(h => h.warning == 1).length;
            const maxVal = Math.max(...history.map(h => h.analog));

            statTotal.textContent = history.length;
            statAlerts.textContent = alerts;
            statMax.textContent = maxVal;

            historyList.innerHTML = history.map((h, i) => `
            <div class="history-item ${h.warning == 1 ? 'danger' : 'safe'}">
                <span class="hi-val">${h.analog}</span>
                <span>${h.warning == 1 ? '🚨 Khói' : '✅ OK'}</span>
                <span class="hi-time">${h.time}</span>
            </div>
            `).join('');
        }

        function clearHistory() {
            history = [];
            localStorage.removeItem('smokeHistory');
            renderHistory();
        }

        function updateLastTime() {
            const now = new Date();
            lastUpdate.textContent = 'Cập nhật lúc: ' + now.toLocaleTimeString('vi-VN');
        }

        // ===== FIREBASE =====
        database.ref('/thiet_bi_1/realtime').on('value', (snapshot) => {
            const data = snapshot.val();

            connBadge.classList.add('online');
            connText.textContent = 'TRỰC TUYẾN';

            if (data) {
                const analog = data.analog ?? 0;
                const warning = data.canh_bao ?? 0;

                updateGauge(analog);
                updateStatus(analog, warning);
                updateLastTime();

                addHistory(analog, warning);

                if (warning == 1 && prevAlert !== 1) {
                    triggerAlertFlash();
                }

                prevAlert = warning;
            }
        }, (error) => {
            connText.textContent = 'LỖI KẾT NỐI';
            console.error(error);
        });
    </script>
